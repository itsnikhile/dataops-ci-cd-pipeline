name: Data Quality CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy requests pyyaml python-dotenv pytest

      - name: Run quality gate demo
        run: |
          python -c "
          import pandas as pd
          import numpy as np
          import json, os

          np.random.seed(42)
          n = 50000
          df = pd.DataFrame({
              'transaction_id': [f'TXN_{i:08d}' for i in range(n)],
              'user_id': [f'USER_{np.random.randint(0,10000):05d}' for _ in range(n)],
              'amount': np.random.lognormal(4, 1, n).round(2),
              'email': [f'u{i}@example.com' for i in range(n)],
          })

          checks = {
              'row_count': len(df) >= 1000,
              'no_null_user_id': df['user_id'].isna().sum() == 0,
              'no_null_txn_id': df['transaction_id'].isna().sum() == 0,
              'unique_txn_ids': df['transaction_id'].duplicated().sum() == 0,
              'valid_amounts': ((df['amount'] > 0) & (df['amount'] < 1000000)).all(),
          }

          passed = sum(checks.values())
          total = len(checks)
          rate = round(passed / total * 100, 1)

          print('Quality Gate Results:')
          for name, result in checks.items():
              print(f'  {\"PASS\" if result else \"FAIL\"} - {name}')
          print(f'Score: {passed}/{total} ({rate}%)')

          os.makedirs('reports', exist_ok=True)
          with open('reports/quality_report.json', 'w') as f:
              json.dump({'passed': passed, 'total': total, 'rate': rate}, f, indent=2)

          assert passed == total, f'Gate BLOCKED: {total-passed} checks failed'
          print('Gate PASSED')
          "

      - name: Upload quality report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: quality-report
          path: reports/
